name: 🐛 Bug 报告
description: 报告测试套件、构建/CI 或被测系统中的缺陷
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告问题！请尽量完整填写以下信息，便于快速定位。
        > 涉及安全漏洞请勿在此公开，参见 [SECURITY.md](../blob/main/SECURITY.md)。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰、简洁地描述这个 Bug。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 让我们能够复现的最小步骤。
      placeholder: |
        1. 执行 '...'
        2. 访问 '...'
        3. 看到错误 '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际发生了什么？请附上报错日志/堆栈（如有）。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - 测试代码（labs-management/src/test）
        - 构建 / CI（Maven、GitHub Actions、JaCoCo）
        - 被测系统后端（Spring Boot）
        - 被测系统前端（Vue3）
        - 文档（docs/）
        - 其他
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境信息
      description: 操作系统、JDK 版本、Maven 版本、是否使用 Docker 等。
      placeholder: "例：Windows 11 / Temurin 21.0.7 / Maven 3.9.9 / Docker 启动"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issue，确认没有重复。
          required: true
        - label: 我已阅读 README 与 docs/guides/如何启动项目.md。
          required: true
