# ============================================================================
# 开放实验室预约系统 · 一键启动编排
# 一条命令拉起：MySQL8 + Redis7 + 后端(Spring Boot/JDK8) + 前端(Vue3+nginx)
#   docker compose up -d --build
# 默认访问：前端 http://localhost:81  （账号 admin / admin123）
# 端口映射避开本机已占用的 3306/6379：MySQL->3307，Redis->6380
# 可在同目录 .env 覆盖端口、库名、密码等。
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: olrs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-open_lab_reservation}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      # 强制所有连接按 utf8mb4 解释，修复 ry_20250417.sql 导入时的中文乱码
      - --skip-character-set-client-handshake
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 初始化脚本按 01/02/03 顺序执行（系统表→定时任务表→业务表+菜单）
      - ./back/labs/sql/ry_20250417.sql:/docker-entrypoint-initdb.d/01-ry.sql:ro
      - ./back/labs/sql/quartz.sql:/docker-entrypoint-initdb.d/02-quartz.sql:ro
      - ./back/labs/sql/business.sql:/docker-entrypoint-initdb.d/03-business.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_PASSWORD:-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: olrs-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./back/labs
      dockerfile: ../../docker/backend.Dockerfile
    image: olrs-backend:local
    container_name: olrs-backend
    environment:
      SPRING_PROFILES_ACTIVE: druid,docker
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-open_lab_reservation}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RUOYI_PROFILE: /home/ruoyi/uploadPath
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - upload-data:/home/ruoyi/uploadPath
      - backend-logs:/home/ruoyi/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./front/RuoYi-Vue3
      dockerfile: ../../docker/frontend.Dockerfile
    image: olrs-frontend:local
    container_name: olrs-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-81}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  upload-data:
  backend-logs:
